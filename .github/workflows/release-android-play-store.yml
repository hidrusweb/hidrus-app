name: Android Release to Play Store (EAS)

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  release-android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Expo and EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Link EAS project (non-interactive)
        run: eas init --id "${{ secrets.EAS_PROJECT_ID }}" --force --non-interactive

      - name: Create Google Play service account key file
        env:
          GOOGLE_SA_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SA_JSON_B64: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON_B64 }}
        run: |
          mkdir -p .secrets
          if [ -n "$GOOGLE_SA_JSON_B64" ]; then
            echo "$GOOGLE_SA_JSON_B64" | base64 -d > .secrets/google-play-service-account.json
          else
            printf '%s' "$GOOGLE_SA_JSON" > .secrets/google-play-service-account.json
          fi
          python3 -c "import json, pathlib; p=pathlib.Path('.secrets/google-play-service-account.json'); json.load(p.open()); print('OK: service account JSON is valid')"

      - name: Build Android production bundle (AAB)
        run: eas build --platform android --profile production --non-interactive --wait
        env:
          EXPO_PUBLIC_API_URL: ${{ vars.EXPO_PUBLIC_API_URL }}
          EXPO_PUBLIC_API_MODE: ${{ vars.EXPO_PUBLIC_API_MODE }}
          EXPO_PUBLIC_API_DEBUG: ${{ vars.EXPO_PUBLIC_API_DEBUG }}

      - name: Submit latest Android build to Play Store
        run: eas submit --platform android --profile production --latest --non-interactive
