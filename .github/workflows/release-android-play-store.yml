name: Android Release to Play Store (EAS)

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  release-android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Expo and EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Link EAS project (non-interactive)
        run: eas init --id "${{ secrets.EAS_PROJECT_ID }}" --force --non-interactive

      - name: Create Google Play service account key file
        run: |
          mkdir -p .secrets
          printf '%s' "${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}" > .secrets/google-play-service-account.json

      - name: Build Android production bundle (AAB)
        run: eas build --platform android --profile production --non-interactive --wait
        env:
          EXPO_PUBLIC_API_URL: ${{ vars.EXPO_PUBLIC_API_URL }}
          EXPO_PUBLIC_API_MODE: ${{ vars.EXPO_PUBLIC_API_MODE }}
          EXPO_PUBLIC_API_DEBUG: ${{ vars.EXPO_PUBLIC_API_DEBUG }}

      - name: Submit latest Android build to Play Store
        run: eas submit --platform android --profile production --latest --non-interactive
